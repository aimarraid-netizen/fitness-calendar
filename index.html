<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Treeningute Kalender</title>

    <!-- iOS Web App optimeeringud -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Trenn">

    <!-- Cache control - värskenda alati -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- Chart.js for progress graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #181818;
            --surface2: #222;
            --border: #2a2a2a;
            --text: #f0f0f0;
            --text2: #b0b0b0;
            --text3: #666;
            --accent: #e0bd7a;
            --accent2: #bd9d67;
            --green: #6fc282;
            --red: #d96560;
            --blue: #6fa8d4;
            --purple: #a583ce;
            --orange: #e0a35a;
            --cyan: #6fbbbb;
            --brown: #a4866e;
            --radius: 6px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 960px; margin: 0 auto; }
        .timestamp {
            text-align: right;
            font-size: 11px;
            color: var(--text3);
            margin-bottom: 16px;
            letter-spacing: 0.3px;
        }

        .month-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 12px 0;
        }
        .month-nav button {
            background: transparent;
            color: var(--text2);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 13px;
            letter-spacing: 0.5px;
            transition: all 0.15s;
        }
        .month-nav button:hover {
            color: var(--text);
            border-color: var(--accent);
        }
        .month-nav h2 {
            color: var(--text);
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
            margin-bottom: 24px;
        }
        .day-header {
            padding: 10px 4px;
            text-align: center;
            font-weight: 500;
            font-size: 11px;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .day {
            background: var(--surface);
            padding: 10px 6px;
            text-align: center;
            border-radius: var(--radius);
            min-height: 76px;
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid transparent;
            position: relative;
        }
        .day:hover {
            border-color: var(--accent);
            background: var(--surface2);
        }
        .day.empty { opacity: 0.2; cursor: default; border: none; }
        .day.empty:hover { background: var(--surface); }

        .day.gym-jalad { border-left: 3px solid var(--red); }
        .day.gym-rind { border-left: 3px solid var(--green); }
        .day.gym-selg { border-left: 3px solid var(--accent); }
        .day.walking { border-left: 3px solid var(--blue); }
        .day.running { border-left: 3px solid var(--orange); }
        .day.cycling { border-left: 3px solid var(--purple); }
        .day.hiking { border-left: 3px solid var(--brown); }
        .day.swimming { border-left: 3px solid var(--cyan); }
        .day.multi { border-left: 3px solid var(--accent); }

        .day-number {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #ffffff;
        }
        .day-name {
            font-size: 10px;
            margin-top: 3px;
            font-weight: 500;
            line-height: 1.2;
            color: var(--text2);
        }
        .day-cardio-info {
            font-size: 9px;
            margin-top: 2px;
            line-height: 1.2;
            color: var(--text3);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(4px);
            z-index: 1000;
            overflow-y: auto;
        }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .modal-content {
            background: var(--surface);
            padding: 28px;
            border-radius: 10px;
            max-width: 720px;
            width: 95%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--border);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }
        .modal-header h2 {
            font-weight: 500;
            font-size: 18px;
        }
        .close {
            font-size: 24px;
            cursor: pointer;
            color: var(--text3);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius);
            transition: all 0.15s;
        }
        .close:hover { color: var(--text); background: var(--surface2); }

        .workout-analysis {
            margin-top: 16px;
            padding: 16px;
            background: var(--bg);
            border-radius: var(--radius);
            border-left: 3px solid var(--purple);
        }
        .workout-analysis h3 {
            margin-bottom: 8px;
            color: var(--purple);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .analysis-text { color: var(--text2); line-height: 1.7; font-size: 14px; }

        .workout-details {
            margin-bottom: 16px;
            padding: 16px;
            background: var(--bg);
            border-radius: var(--radius);
            border-left: 3px solid var(--green);
        }
        .workout-details.cardio { border-left-color: var(--blue); }
        .workout-details h3 {
            margin-bottom: 8px;
            color: var(--text);
            font-size: 15px;
            font-weight: 500;
        }
        .workout-details p { margin: 4px 0; color: var(--text2); font-size: 14px; }

        .workout-table {
            width: 100%;
            margin-top: 12px;
            border-collapse: collapse;
            font-size: 13px;
        }
        .workout-table th {
            padding: 8px 10px;
            text-align: left;
            font-weight: 500;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text3);
            border-bottom: 1px solid var(--border);
        }
        .workout-table td {
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
            color: var(--text2);
        }
        .workout-table tr:hover td { color: var(--text); }
        .workout-table .comparison { font-size: 11px; font-weight: 600; }
        .workout-table .comparison.positive { color: var(--green); }
        .workout-table .comparison.negative { color: var(--orange); }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 8px;
            margin-top: 20px;
        }
        .stat-card {
            background: var(--surface);
            padding: 14px 8px;
            border-radius: var(--radius);
            text-align: center;
            border: 1px solid var(--border);
        }
        .stat-value {
            font-size: 28px;
            font-weight: 600;
            color: #ffffff;
            margin: 4px 0;
        }
        .stat-label { color: var(--text); font-size: 14px; letter-spacing: 0.3px; }

        /* Progress */
        .progress-section {
            margin-top: 24px;
            background: var(--surface);
            padding: 20px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }
        .progress-section h3 {
            color: var(--text);
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 16px;
        }
        .progress-group { margin-bottom: 20px; }
        .progress-group:last-child { margin-bottom: 0; }
        .progress-group-title {
            color: var(--text);
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            padding-left: 6px;
            border-left: 3px solid var(--accent);
        }
        .progress-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }
        .progress-item {
            background: var(--bg);
            padding: 12px 14px;
            border-radius: var(--radius);
            border-left: 2px solid var(--accent);
            display: grid;
            grid-template-columns: minmax(140px, 180px) 1fr auto;
            align-items: center;
            gap: 14px;
        }
        .progress-item .exercise-name {
            color: var(--text);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.2px;
        }
        .progress-item .exercise-name .metric-unit {
            color: var(--text3);
            font-size: 11px;
            font-weight: 400;
            display: block;
            margin-top: 2px;
        }
        .progress-item .mini-chart-wrapper {
            position: relative;
            height: 70px;
            min-width: 0;
        }
        .progress-item .progress-summary {
            color: var(--text2);
            font-size: 11px;
            text-align: right;
            white-space: nowrap;
            line-height: 1.4;
        }
        .progress-item .progress-summary .trend {
            font-weight: 600;
            font-size: 13px;
        }
        .progress-item .progress-summary .trend.up { color: var(--green); }
        .progress-item .progress-summary .trend.down { color: var(--red); }
        .progress-item .progress-summary .trend.flat { color: var(--text3); }
        .progress-item .no-data {
            color: var(--text3);
            font-size: 11px;
            text-align: center;
            padding: 20px 0;
        }

        /* Mobile */
        @media (max-width: 768px) {
            body { padding: 12px; }

            .month-nav button {
                padding: 10px 14px;
                font-size: 13px;
                min-width: 70px;
                touch-action: manipulation;
            }
            .month-nav h2 { font-size: 17px; }

            .calendar { gap: 2px; margin-bottom: 16px; }
            .day-header { padding: 6px 2px; font-size: 10px; }
            .day {
                padding: 7px 3px;
                min-height: 58px;
                touch-action: manipulation;
            }
            .day-number { font-size: 13px; margin-bottom: 2px; }
            .day-name { font-size: 9px; margin-top: 2px; }
            .day-cardio-info { font-size: 8px; }

            .modal-content {
                padding: 16px;
                width: 98%;
                max-height: 90vh;
                margin: 8px;
            }
            .modal-header h2 { font-size: 16px; }

            .workout-details { padding: 12px; }
            .workout-details h3 { font-size: 14px; }
            .workout-details p { font-size: 13px; }

            .workout-table {
                font-size: 11px;
                display: block;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            .workout-table th, .workout-table td {
                padding: 6px 4px;
                font-size: 11px;
            }

            .stats {
                grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
                gap: 4px;
                margin-top: 12px;
            }
            .stat-card { padding: 10px 4px; }
            .stat-value { font-size: 18px; }
            .stat-label { font-size: 9px; }

            .progress-section {
                padding: 14px;
                margin-top: 16px;
            }
            .progress-grid { gap: 8px; }
            .progress-item {
                grid-template-columns: 110px 1fr auto;
                gap: 10px;
                padding: 10px 12px;
            }
            .progress-item .exercise-name { font-size: 11px; }
            .progress-item .exercise-name .metric-unit { font-size: 10px; }
            .progress-item .mini-chart-wrapper { height: 56px; }
            .progress-item .progress-summary { font-size: 10px; }
            .progress-item .progress-summary .trend { font-size: 12px; }
        }

        @media (max-width: 400px) {
            .month-nav h2 { font-size: 15px; }
            .day { min-height: 48px; padding: 5px 2px; }
            .day-number { font-size: 12px; }
            .day-name { font-size: 8px; }
            .stats { grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); }
        }
    </style>
</head>

        const analyses = {"2026-03-03": "Selg & biitseps — tugev treening pärast nädalast pausi. Bent Over Row 3×9@55kg näitab head progressi (jaanuaris 3×8@50kg). Lat Pulldown 3×9@50kg ja Seated Cable Rows 3×12@50kg — uus harjutus programmis, hea lisa latsidele. Barbell Curl 30kg juures püsib stabiilselt. Kogumaht 5820kg on sinu selgapäeva rekord siiani.\n\nTopeltprogressioon töötab: Row'is oled kordusi lisanud ja raskust tõstnud. Järgmine samm: Row 3×10@55kg, siis raskuse tõus 60kg peale.", "2026-03-08": "Jalad & kõht — Squat 55kg juures 9-10-9 kordust, stabiilne. Romanian Deadlift 3×11@50kg näitab head progressi (jaanuaris 40kg). Kogumaht 6710kg on tugev jalapäev. Single-Leg Press ja Standing Calf Raise (3×20@40kg) annavad hea lisa.\n\nSoovitus: Squatis proovi järgmine kord kõik 3 setti 10 kordust välja võtta, siis saad raskust 60kg peale tõsta.", "2026-03-10": "Rind, õlg & triitseps — Bench Press 3×9@60kg, hea progress! Jaanuaris alustasid 50kg-ga, nüüd 60kg ja 9 kordust. Incline DB Press 3×12@15kg — vahemiku ülemine piir täis, järgmine kord tõsta 17.5kg peale. Lying Triceps Press 3×12@25kg samuti vahemiku tipus.\n\nKogumaht 3933kg. Triceps Pushdown lisatud programmi — hea isolatsiooniharjutus triitsepsile.", "2026-03-14": "Selg & biitseps — Row 3×10@55kg, Pulldown 3×10@50kg, Cable Rows 3×10@55kg. Kõik põhiharjutused on korralikult vahemiku keskel. Barbell Curl 3×10@30kg püsib stabiilne. Kogumaht 6000kg.\n\nVõrreldes 03.03 treeninguga on Cable Rows raskus 50→55kg tõusnud. Hea näide topeltprogressioonist tegevuses.", "2026-03-15": "Jalad & kõht — Squat 3×10@55kg, kõik setid täis! Nüüd on aeg raskust tõsta → 60kg. Romanian Deadlift 3×10@60kg — 10kg tõus võrreldes jaanuariga. Standing Calf Raise 3×25@40kg — siin samuti vahemiku ülemine piir, tõsta raskust.\n\nKogumaht 7474kg on sinu parim jalapäev! Progressioon on selgelt nähtav: jan 2800kg → märts 7474kg.", "2026-03-17": "Rind, õlg & triitseps — Bench Press 3×10@60kg! Vahemiku ülemine piir täis, järgmine kord 65kg. See on märkimisväärne progress: jaanuaris 50kg, nüüd 60kg×10. Incline DB Press tõusnud 17.5kg peale. Seated Triceps Press uue harjutusena asendab Dipse — hea valik, annab triitsepsile teise nurga.\n\nLying Triceps Press 3×10@27.5kg — ka siin raskus tõusnud. Kogumaht 4584kg, sinu parim rinnapäev.", "2026-03-21": "Selg & biitseps — Bent Over Row 3×10@60kg! Suur hüpe — jaanuaris 40kg, nüüd 60kg. Pulldown 3×11@50kg ja Cable Rows 3×11@55kg — mõlemas kordused kasvavad. Barbell Curl 3×11@30kg, peaaegu valmis 32.5kg jaoks.\n\nKogumaht 6630kg, uus selgapäeva rekord. Seljalihastes on progress olnud kiireim — 3 kuu jooksul on Row raskus +50%.", "2026-03-22": "Tubli 62-minutiline õhtune jalutuskäik 6km distantsiga – aktiivne liikumine on paigas, kuid pulss jäi peamiselt Z1 tsooni (alla 132 bpm), mis tähendab, et rasvapõletuse optimaalne Z2 tsoon (132-144) jäi seekord suuresti kasutamata.\n\n✅ **Plussid:**\n- 62 min järjepidev liikumine ja 649 kcal kulutatud – see on korralik kaloripõletus! 🔥\n- 6.06 km distants heas tempos (~10.2 min/km) – jalad liiguvad! 🚶\n- Max HR 140 bpm näitab, et mõnedel hetkedel jõudsid Z2 tsooni – hea märk!\n\n⚠️ **Miinused:**\n- Keskmine HR 129 bpm jäi Z1 tsooni (121-132) – rasvapõletuse optimaalne Z2 (132-144) jäi kasutamata\n- Kaalulangetus eesmärgi juures on Z2 kriitiline – sellise tempoga käimine annab küll kaloripõletust, aga mitte maksimaalset rasvapõletust\n\n🎯 **Soovitused:**\n- Tõsta kõndimistempot ~0.5-1 km/h võrra, et keskmine HR jõuaks 132-140 bpm vahele (Z2) – see on su rasvapõletuse 'magus koht' 🎯\n- Lisa kergelt mäkke/kaldele kõndimine kui võimalik – see tõstab HR-i ilma tempot suurendamata, ideaalne Z2 hoidmiseks\n- Eesmärk: järgmisel jalutuskäigul hoida HR 132-144 vahel vähemalt 30-40 minutit – see loeb juba täisväärtusliku rasvapõletuse treeninguna ⭐", "2026-03-23": "Korralik 67-minutiline jalutuskäik 7km ja 699 kcal - kestus ja distants on head, aga pulss jäi natuke alla optimaalse Z2 tsooni piiri (128 bpm vs Z2 algus 132 bpm).\n\n✅ **Plussid:**\n- Pikk kestus 67 min ja hea distants 7.0 km - üks parimaid kõndimisi ajaloos (võrreldav 23.03 käiguga)\n- 699 kcal põletatud - märkimisväärne kalorikulu kaalulangetuse eesmärgi jaoks\n- Max HR 142 bpm näitab, et tipphetkedel jõudsid Z2 tsooni - tempo oli kohati õige\n\n⚠️ **Miinused:**\n- Keskmine HR 128 bpm on Z1 tsoonis (121-132), mitte Z2-s (132-144) - rasvapõletus ei olnud optimaalne kogu treeningu vältel\n- Z2 efektiivset aega oli tõenäoliselt vaid osa treeningust (ainult hetked max HR 142 lähedal)\n\n🎯 **Soovitused:**\n- Tõsta tempot ~0.5-1 km/h või lisa kalle (kui treadmill) - eesmärk hoida HR 132-144 bpm KOGU kõndimise vältel Z2 rasvapõletuse tsoonis\n- Proovi järgmisel kõnnil 'talk test' meetodit: peaksid suutma rääkida lühikesi lauseid, aga mitte laulda - see annab Z2 tunde ilma pulsimõõtjata\n- Hea rutiin on käimas - järjepidevus on olemas, lihtsalt natuke intensiivsust juurde! 🔥", "2026-03-24": "Rind, õlg & triitseps — Bench Press 3×6@65kg! Raskus tõusnud 60→65kg, kordused langesid 10→6, mis on täpselt topeltprogressiooni loogika. Nüüd hakka kordusi üles ehitama: 7, 8... kuni jõuad 10-ni, siis 70kg.\n\nIncline DB Press 3×11@17.5kg, Lying Triceps Press 3×11@27.5kg — mõlemad liiguvad üles. Side Lateral Raise 3×15@7kg — ülemine piir täis, tõsta 8kg. Kogumaht 4230kg.", "2026-03-29": "Üsna intensiivne rattasõit Z4 tsoonis – südamelöögisagedus oli keskmiselt 164 bpm, mis tähendab, et suurem osa sõidust toimus lävi-tsoonis, mitte optimaalses rasvapõletuse tsoonis. Kaalulangetuse eesmärgi seisukohalt polnud see ideaalne sessioon, aga kardiovaskulaarne koormus oli korralik.\n\n✅ **Plussid:**\n- Rattasõit on suurepärane mitmekesistus tavapärasele jõusaali+kõndimine rutiinile – keha saab uut stimulatsiooni 🚴\n- 424 kcal 49 minutiga on tugev kalorikulu, mis toetab kaalu langetamist kogu päeva energiabilansi kaudu\n- Max HR 178 bpm on praktiliselt absoluutne maksimum (sinu max on 179) – tähendab, et said kardiovaskulaarselt kõvasti treenitud\n\n⚠️ **Miinused:**\n- Keskmine HR 164 bpm = Z4 (lävi tsoon), mis ei ole optimaalne rasvapõletuseks – ideaalne oleks Z2 (132-144 bpm). Suurem osa sõidust toimus liiga intensiivsel tasemel kaalulangetuse seisukohalt ⚠️\n- Võrreldes varasema rattasõiduga (03.08.2025: 190 min, 24.5 km, HR 154 bpm) oli see sessioon samuti kõrge intensiivsusega – näib et sul on kalduvus rattaga 'liiga kõvasti' sõita\n- Nii kõrge intensiivsus päeval, mil tegid ka selg & biitseps treeningu (29.03), tähendab väga suurt kogukoormust ühele päevale – taastumist vajav kombinatsioon\n\n🎯 **Soovitused:**\n- Järgmisel rattasõidul proovi hoida HR teadlikult Z2 tsoonis (132-144 bpm) – see tähendab aeglasemat tempot, aga optimaalset rasvapõletust. Pane Garmin/kellale HR alarm üles piirile 144 bpm 🎯\n- Jõusaal + intensiivne kardio samal päeval on suur koormus 43-aastasele kehale – proovi kardio teha eraldi päeval või teha see ENNE jõusaali, mitte pärast\n- Kui soovid rattaga Z4 intervalltreeninguid teha, siis planneeri see eraldi päevale ilma jõusaalita ja lisa järgmine päev kerge Z1-Z2 taastumistegevus (jalutuskäik)", "2026-03-31": "Rind, õlg & triitseps — Bench 3×7@65kg, üks kordus rohkem kui 24.03! Topeltprogressioon toimib. Side Lateral Raise 3×12@8kg — raskus tõusnud. Lying Triceps Press 3×12@27.5kg — vahemiku ülemine piir, järgmine kord 30kg.\n\nTriceps Pushdown 3×13@20kg — vahemik ületatud, tõsta raskust. Kogumaht 4653kg, rinnapäeva rekord. Märtsis oli 5 rinnapäeva — hea tihedus.", "2026-04-08": "Selg & biitseps — 10-päevane paus pärast märtsi lõpu intensiivset perioodi. Row 3×7@60kg — raskus langetatud 65→60kg, mis on mõistlik pärast pausi. Lat Pulldown 3×10@60kg — uus PR raskuses! Cable Rows 3×10@60kg samuti tõusnud.\n\nBarbell Curl 3×8@32.5kg — uus raskus! Kogumaht 6090kg. Paus ei ole progressi kahjustanud — mitmes harjutuses on raskused isegi tõusnud.", "2026-04-11": "Rind, õlg & triitseps — Bench 3×8@65kg, jälle +1 kordus! Trend: 6→7→8. Veel 2 treeningut ja oled 10 korduse juures, siis saab 70kg proovida. Incline DB Press 3×10@20kg — uus PR! Lying Triceps Press 3×10@30kg — samuti uus raskus.\n\nSide Lateral Raise 3×13@8kg liigub üles. Kogumaht 4792kg, rinnapäeva uus rekord. 3-kuune progress: Bench 50kg→65kg (+30%), Incline DB 12kg→20kg (+67%).", "2026-04-13": "# Analüüs: Rind, õlg & triitseps (11.04.2026)\n\n## Viimane treening lühidalt\n\nRinnatreening kestis 66 minutit, kogumaht 4792 kg. Sooritati 7 harjutust koos ergomeetri soojendusega.\n\n## Võrdlus eelmiste sama tüüpi treeningutega\n\n| Harjutus | 17.03 | 24.03 | 31.03 | 11.04 |\n|---|---|---|---|---|\n| Bench Press | 3x10 @ 60kg | 3x6 @ 65kg | 3x7 @ 65kg | 3x8 @ 65kg |\n| Incline DB Press | 3x10 @ 17.5kg | 3x11 @ 17.5kg | 3x12 @ 17.5kg | 3x10 @ 20kg |\n| Seated Triceps Press | 3x8 @ 20kg | 3x9 @ 20kg | 3x10 @ 20kg | 3x11 @ 20kg |\n| Side Lateral Raise | 3x14 @ 7kg | 3x15 @ 7kg | 3x12 @ 8kg | 3x13 @ 8kg |\n| Lying Triceps Press | 3x10 @ 27.5kg | 3x11 @ 27.5kg | 3x12 @ 27.5kg | 3x10 @ 30kg |\n| Triceps Pushdown | 3x11 @ 20kg | 3x12 @ 20kg | 3x13 @ 20kg | 3x14 @ 20kg |\n\n## Isiklikud rekordid\n\nNeli harjutust saavutasid PR-i samal treeningul:\n- Bench Press 3x8 @ 65kg - uus PR, topeltprogressioon toimib korrektselt\n- Incline Dumbbell Press 3x10 @ 20kg - raskemat tõusti\n- Lying Triceps Press 3x10 @ 30kg - raskemat tõusti\n- Seated Triceps Press 3x11 @ 20kg - korduste PR\n\nKogumaht kasvas viimase kolme rinnatreeningu käigus stabiilselt: 4584 kg - 4230 kg - 4653 kg - 4792 kg.\n\n## Soovitused järgmiseks treeninguks\n\nBench Press: jätka 3x6 @ 67.5kg - oled saavutanud 3x8, raskust tõsta.\n\nTriceps Pushdown: kuna viimane sett tehti eraldi (1x10), kaalu järgmisel korral struktureerida 3x15 ühes plokis, et maht oleks selgem ja progressioon järjepidevam.", "2026-04-12": "Tugev Z2 kõnnitreening – 56 minutit ideaalses rasvapõletustsoonis (Z2: 132-144 bpm), 6 km ja 657 kcal. Kardio on viimastel nädalatel tõsiselt käima läinud!\n\n✅ **Plussid:**\n- ✅ Keskmine HR 138 bpm = täpselt Z2 tsooni keskel (132-144) – optimaalne rasvapõletus kogu treeningu vältel\n- 💥 Kardio trend on plahvatuslik: viimased 4 nädalat 7 kardiotreeningut vs eelmised 4 nädalat vaid 2 – see on +250% kasv!\n- ⏱️ 56 min kestus ületab Z2 miinimumi (30 min) ligi 2x – tõsine töö rasvapõletuse nimel\n\n⚠️ **Miinused:**\n- ⚠️ Max HR 153 bpm (Z3 tsoon) – mõnel hetkel libises tempo Z3-sse, mis pole probleem, aga näitab et käimine oli kohati kiire või künklik\n- 📊 Distants 6 km / 56 min = ~9.3 min/km tempo – üsna aeglane, HR arvestades on see normaalne, aga tasapisi võib tempot tõsta\n\n🎯 **Soovitused:**\n- 🎯 Proovi järgmisel kõnnil hoida HR vahemikus 133-142 bpm kogu aeg – kui HR tõuseb üle 144, aeglusta veidi et püsida optimaalses Z2-s\n- 📈 Distantsi eesmärk: proovi järgmisel korral jõuda 6.5 km-ni sama ajaga (56 min) – see näitab aeroobse võimekuse kasvu\n- 🏋️ Kuna homme või ülejärve on tõenäoliselt jõutrenn, kasuta seda kõndi aktiivse taastumisena – sobib ideaalselt selja- või rinnatreeningu järgseks päevaks", "2025-08-03": "Pikk 190-minutiline rattasõit 24.5 km distantsiga - enne jõusaaliperioodi algust (august 2025). Sõit toimus valdavalt Z3-Z4 tsoonis, mis on intensiivsem kui kaalulangetuseks optimaalne, kuid näitab head vastupidavust.\n\n✅ **Plussid:**\n- Tohutu kalorikulu 937 kcal - üks suurimaid üksiku treeningu energiakulusid kogu ajaloos 🔥\n- 190 minutit järjest rattasõitu on suurepärane vastupidavustöö - näitab head aeroobset baasi enne jõusaaliperioodi algust\n- Max HR 179 bpm = täpselt Aimari maksimaalne pulss - näitab, et pingutati täismahusse, andsin kõik!\n\n⚠️ **Miinused:**\n- Keskmine HR 154 bpm on Z3/Z4 piiril - kogu sõit toimus liiga kõrgel intensiivsusel kaalulangetuse seisukohast. Z2 (132-144) oleks rasvapõletuseks efektiivsem 🎯\n- Tempo on suhteliselt madal: 24.5 km / 190 min ≈ 7.7 km/h - see viitab, et kõrge HR tuli maastikust või kehvast vormist, mitte kiirusest. HR drift tõenäoliselt suur.\n- Võrdluseks: 29. märtsi rattasõit (49 min, 11.2 km, sama keskmine HR 164) näitab, et vormiline tase on sarnane - areng on olnud pigem jõusaali suunas, mitte kardio efektiivsuses\n\n🎯 **Soovitused:**\n- Järgmisel rattasõidul proovi hoida HR 132-144 bpm (Z2) - see tähendab aeglasemat tempot, aga rasvapõletus on oluliselt efektiivsem kaalulangetuse eesmärgil 🎯\n- Lühemad, kuid tsoonispetsiifilisemad sõidud (60-90 min Z2-s) annavad kaalulangetuseks parema tulemuse kui 3h Z3-Z4 sõidud\n- Kardio plaan praeguseks: jalutuskäigud (Z2 ~138 bpm) on tegelikult su kõige efektiivsemad kaalulangetuse treeningud - jätka nendega regulaarselt! 👟", "2025-10-26": "Rahulik 50-minutiline ujumistreening Z1 piiril (131 bpm keskmine) - hea madala intensiivsusega liikumine, mis toetab taastumist ja üldist aktiivsust. Kalorite arv (982 kcal) tundub kõrge 50 minuti kohta, aga ujumine ongi kalorimahukas.\n\n✅ **Plussid:**\n- 982 kcal põletatud 50 minutiga - ujumine on suurepärane kaloripõletaja kogu keha treenimiseks 💪\n- Madal HR (131 bpm) näitab kontrolli all hoitud intensiivsust - hea taastumistüüpi treening\n- 50 minutit järjepidevat liikumist basseinis - suurepärane täiendus jõutreeningutele\n\n⚠️ **Miinused:**\n- Keskmine HR 131 bpm jääb napilt Z2 alla (vajaks 132+) - rasvapõletus ei olnud optimaalne\n- 1 km 50 minutiga = 50 min/km tempo on aeglane, mis viitab paljudele puhkepausidele basseinis\n- Puuduvad tsoonide andmed - ei tea täpselt kui palju aega Z1 vs Z2 tsoonis oli\n\n🎯 **Soovitused:**\n- Järgmisel ujumistreeningul proovi hoida tempot pisut kõrgemal, et keskmine HR jõuaks 132-140 bpm piirkonda (Z2 tsoon) - see optimeeriks rasvapõletust 🎯\n- Puhkepause basseinis võiks vähendada - proovi 4×200m intervallidena minimaalse puhkusega, et distants kasvaks 1.2-1.5 km suunas\n- Ujumine sobib ideaalselt taastumispäevaks jõutreeningute kõrvale - planeeri see teadlikult päev pärast rasket jõutreeningut 🏊", "2025-10-28": "Korralik ujumissessioon 46 minutit, 1.02 km – pulssi vaadates oli see päris intensiivne treening Z3-Z4 tsoonis, mis annab märku, et ujumises on veel palju arenguruumi (tugev ujuja hoiaks sama tempo juures madalamat pulssi).\n\n✅ **Plussid:**\n- 846 kcal põletatud on märkimisväärne – ujumine on kaloripõletuselt üks efektiivsemaid spordialasid 💪\n- 46 min järjepidev ujumine näitab head vastupidavust – ei loobunud ega teinud pikki pause\n- Mitmekesisus on hea! Ujumine täiendab jõutreeningut suurepäraselt – liigestele sõbralik, kogu keha töötab\n\n⚠️ **Miinused:**\n- Keskmine HR 145 bpm (Z3) ja max 163 bpm (Z4) – see on pigem intensiivne aeroobne treening, mitte optimaalne rasvapõletuse tsoon (Z2 oleks 132-144). Kaalulangetuse eesmärgi jaoks natuke liiga kõrge pulss 🔴\n- 1.02 km 46 minutiga = ~2.2 min/100m tempo viitab, et ujumistehnika võib olla energiamahukas – palju energiat kulub 'ellujäämisele', mitte efektiivsele ujumisele\n- Võrreldes sama perioodi teise ujumisega (26.10, HR 131 bpm, 1.0 km, 50 min) on HR oluliselt kõrgem – väsimus? Või erinev intensiivsus?\n\n🎯 **Soovitused:**\n- Ujumistehnikale tasub tähelepanu pöörata – mõni ujumisõppetund või YouTube'ist freestyle tehnika videod aitaksid pulssi alandada ja distantsi kasvatada sama pingutusega 🏊\n- Kui eesmärk on kaalulangetus, proovi ujuda vahelduvalt: 2 min rahulikult (Z2 pulss ~132-144) + 30 sek kiiremini – see hoiab keskmise pulssi Z2 lähedal ja põletab rohkem rasva\n- Jälgi järgmistel ujumistel, kas saad hoida HR alla 145 – kui jah, siis aeroobsed võimed arenevad! See on hea mõõdik progressi jaoks 📊", "2025-11-13": "102-minutiline jalutuskäik madala keskmise pulsiga (102 bpm) - distants ja tempo on aga murettekitavalt madalad: 3.67 km 102 minutiga teeb ~2.8 km/h, mis on väga aeglane käimistempo.\n\n✅ **Plussid:**\n- Pikk kestus (102 min) näitab head järjepidevust ja tahet liikuda 🕐\n- 521 kcal põletatud - absoluutarvuna mitte halb pika seansi eest\n- Max HR 152 bpm näitab, et lühihetkedel (tõusud?) jõudis pulss Z3 tsooni\n\n⚠️ **Miinused:**\n- Keskmine HR 102 bpm on alla Z1 tsooni alammäära (121 bpm) - see on praktiliselt puhkepulss, rasvapõletuseks liiga madal 😕\n- Tempo ~2.8 km/h on äärmiselt aeglane - normaalne käimistempo on 5-6 km/h, see viitab võimalikele pausidele, peatustele või maastikule\n- Ilma Z2 ajata (132-144 bpm) pole see treening kaalulangetuse seisukohast efektiivne\n\n🎯 **Soovitused:**\n- Tõsta käimistempot vähemalt 4.5-5 km/h-ni, et pulss jõuaks Z2 tsooni (132-144 bpm) - see on sinu rasvapõletuse 'magus koht' 🎯\n- Proovi järgmisel kõnnitreeningul hoida pulss 132-144 vahel kogu seansi vältel - kui liiga madal, lisa kalle või kiirusta sammuga\n- Sihiks 45-60 min püsivat Z2 tempot (mitte 102 min alla Z1) - kvaliteet üle kvantiteedi kardio puhul", "2026-02-21": "Tubli laupäevane matkasessioon - 7.93 km ja 136 minutit jalgsi, mis põletas 1077 kcal! Keskmine HR jäi Z1 tsooni (125 bpm), mis tähendab aktiivset taastumist, kuigi maksimaalne 165 bpm näitab, et mõned tõusud ajasid pulsi kenasti Z4-sse.\n\n✅ **Plussid:**\n- 🔥 Kalorikulutus oli märkimisväärne - 1077 kcal on ühe sessiooniga väga hea number kaalulangetuse eesmärgi jaoks!\n- ⛰️ 136 minutit madala intensiivsusega aktiivset liikumist on suurepärane taastumissessioon jõutreeningute vahel - keha saab liikuda ilma ülekoormust tekitamata\n- 📈 Maksimaalne HR 165 bpm tõusudel näitab, et maastik pakkus ka korralikke väljakutseid\n\n⚠️ **Miinused:**\n- 📊 Keskmine HR 125 bpm jäi alla Z2 piiri (132 bpm) - rasvapõletuse efektiivsuse seisukohalt oli intensiivsus optimaalsest madalam\n- 🚶 Tempo oli pigem aeglane - 7.93 km / 136 min = ~5.8 km/h, mis on matkale normaalne, kuid Z2 saavutamiseks oleks võinud tempot tõsta\n\n🎯 **Soovitused:**\n- 🎯 Järgmisel matkal proovi hoida tempot nii, et keskmine HR oleks 132-144 bpm (Z2 tsoon) - lisa kiiremat sammu lappidele või vali rohkem tõuse\n- 💪 Seda tüüpi pikk madala intensiivsusega sessioon on ideaalne nädalavahetusel - proovi teha seda regulaarseks komboks: laupäev/pühapäev matk + argipäeviti jõusaal\n- ⚖️ 1077 kcal on suurepärane panus kaalulangetuse kaloripuudujääki - kui toitumine on korras, peaks see nädalal tulemusi andma!"};

        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();

        const monthNames = ['Jaanuar', 'Veebruar', 'Märts', 'Aprill', 'Mai', 'Juuni',
                           'Juuli', 'August', 'September', 'Oktoober', 'November', 'Detsember'];
        const dayNames = ['E', 'T', 'K', 'N', 'R', 'L', 'P'];

        function findPreviousWorkout(workoutType, currentTimestamp) {
            // Leia kõik sama tüüpi treeningud
            const allWorkoutsFlat = [];
            Object.keys(workouts).forEach(date => {
                workouts[date].forEach(w => {
                    if (w.source === 'gymaholic' && w.workout_type === workoutType && w.timestamp < currentTimestamp) {
                        allWorkoutsFlat.push(w);
                    }
                });
            });

            // Sorteeri timestampi järgi kahanevas järjekorras ja võta esimene
            allWorkoutsFlat.sort((a, b) => b.timestamp.localeCompare(a.timestamp));
            return allWorkoutsFlat.length > 0 ? allWorkoutsFlat[0] : null;
        }

        function renderCalendar() {
            const cal = document.getElementById('calendar');
            cal.innerHTML = '';

            // Päeva päised
            dayNames.forEach(day => {
                const header = document.createElement('div');
                header.className = 'day-header';
                header.textContent = day;
                cal.appendChild(header);
            });

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            // Tühjad ruudud
            for (let i = 0; i < (firstDay || 7) - 1; i++) {
                const empty = document.createElement('div');
                empty.className = 'day empty';
                cal.appendChild(empty);
            }

            // Päevad
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayWorkouts = workouts[dateStr] || [];

                const dayEl = document.createElement('div');
                dayEl.className = 'day';

                if (dayWorkouts.length > 0) {
                    const types = [...new Set(dayWorkouts.map(w => {
                        if (w.source === 'gymaholic') {
                            return `gym-${w.workout_type}`;
                        }
                        return w.workout_type;
                    }))];

                    // Värvi kaart (uus stiil)
                    const colorMap = {
                        'gym-jalad': '#d96560',
                        'gym-rind': '#6fc282',
                        'gym-selg': '#e0bd7a',
                        'walking': '#6fa8d4',
                        'running': '#e0a35a',
                        'cycling': '#a583ce',
                        'hiking': '#a4866e',
                        'swimming': '#6fbbbb'
                    };

                    if (types.length > 1) {
                        const colors = types.map(t => colorMap[t] || '#666');
                        dayEl.style.borderLeft = `3px solid ${colors[0]}`;
                        dayEl.style.borderRight = `3px solid ${colors[1]}`;
                        dayEl.className += ' multi';
                    } else {
                        dayEl.className += ` ${types[0]}`;
                    }

                    dayEl.onclick = () => showDetails(dateStr, dayWorkouts);

                    // Treeningu nimed
                    let labels = [];
                    dayWorkouts.forEach(w => {
                        if (w.source === 'gymaholic') {
                            const name = (w.workout_name || '').replace(/^\d+\.\s*/, '').trim();
                            labels.push(`<div class="day-name">${name}</div>`);
                        } else {
                            const cardioNames = {
                                'walking': 'Kõndimine',
                                'running': 'Jooksmine',
                                'cycling': 'Rattasõit',
                                'hiking': 'Matkamine',
                                'swimming': 'Ujumine'
                            };
                            const cardioName = cardioNames[w.workout_type] || w.workout_name || 'Kardio';
                            const distanceInfo = w.distance > 0 ? `${w.distance.toFixed(1)}km` : '';
                            labels.push(`<div class="day-name">${cardioName}</div>` +
                                (distanceInfo ? `<div class="day-cardio-info">${distanceInfo}</div>` : ''));
                        }
                    });

                    dayEl.innerHTML = `
                        <div class="day-number">${day}</div>
                        ${labels.join('')}
                    `;
                } else {
                    dayEl.className += ' empty';
                    dayEl.innerHTML = `<div class="day-number">${day}</div>`;
                }

                cal.appendChild(dayEl);
            }

            document.getElementById('currentMonth').textContent = `${monthNames[currentMonth]} ${currentYear}`;
            updateStats();
        }

        function showDetails(date, dayWorkouts) {
            const modal = document.getElementById('modal');
            const modalDate = document.getElementById('modalDate');
            const modalBody = document.getElementById('modalBody');

            const [y, m, d] = date.split('-');
            modalDate.textContent = `${parseInt(d)}. ${monthNames[parseInt(m) - 1]} ${y}`;

            modalBody.innerHTML = '';

            dayWorkouts.forEach(w => {
                const div = document.createElement('div');
                div.className = w.source === 'gymaholic' ? 'workout-details' : 'workout-details cardio';

                if (w.source === 'gymaholic') {
                    // Leia eelmine sama tüüpi treening
                    const prevWorkout = findPreviousWorkout(w.workout_type, w.timestamp);

                    let exerciseRows = '';
                    if (w.exercises) {
                        w.exercises.forEach(ex => {
                            // Võrdlus eelmise trenniga
                            let weightComparison = '';
                            let repsComparison = '';
                            let weightClass = '';
                            let repsClass = '';

                            if (prevWorkout && prevWorkout.exercises) {
                                const prevEx = prevWorkout.exercises.find(e => e.name === ex.name);
                                if (prevEx) {
                                    const weightDiff = ex.weight_kg - prevEx.weight_kg;
                                    const repsDiff = ex.reps - prevEx.reps;

                                    if (weightDiff > 0) {
                                        weightComparison = ` <span class="comparison positive">(+${weightDiff}kg)</span>`;
                                        weightClass = 'positive';
                                    } else if (weightDiff < 0) {
                                        weightComparison = ` <span class="comparison negative">(${weightDiff}kg)</span>`;
                                        weightClass = 'negative';
                                    }

                                    if (repsDiff > 0) {
                                        repsComparison = ` <span class="comparison positive">(+${repsDiff})</span>`;
                                        repsClass = 'positive';
                                    } else if (repsDiff < 0) {
                                        repsComparison = ` <span class="comparison negative">(${repsDiff})</span>`;
                                        repsClass = 'negative';
                                    }
                                }
                            }

                            // Määra mis näidata Maht veerus
                            let volumeDisplay = '-';
                            if (ex.total_volume > 0) {
                                volumeDisplay = ex.total_volume.toFixed(0) + ' kg';
                            } else if (ex.duration_sec > 0) {
                                // Kui on kestus (Rowing, Walking), näita seda
                                const totalMins = Math.floor(ex.duration_sec / 60);
                                if (totalMins < 60) {
                                    // Alla tunni: "5 min"
                                    volumeDisplay = `${totalMins} min`;
                                } else {
                                    // Üle tunni: "1:05" (hh:mm)
                                    const hours = Math.floor(totalMins / 60);
                                    const mins = totalMins % 60;
                                    volumeDisplay = `${hours}:${mins.toString().padStart(2, '0')}`;
                                }
                            }

                            exerciseRows += `
                                <tr>
                                    <td>${ex.name}</td>
                                    <td>${ex.sets}</td>
                                    <td>${ex.reps}${repsComparison}</td>
                                    <td>${ex.weight_kg > 0 ? ex.weight_kg + ' kg' + weightComparison : '-'}</td>
                                    <td>${volumeDisplay}</td>
                                    <td>${ex.avg_hr > 0 ? ex.avg_hr + ' bpm' : '-'}</td>
                                </tr>
                            `;
                        });
                    }

                    // Eemalda numbrid trenni nimest (nt "1. Jalad & kõht" -> "Jalad & kõht")
                    const cleanWorkoutName = w.workout_name ? w.workout_name.replace(/^\d+\.\s*/, '') : 'Jõutreening';

                    div.innerHTML = `
                        <h3>🏋️ ${cleanWorkoutName}</h3>
                        <p><strong>Kestus:</strong> ${w.duration_min || 0} min | <strong>Kogumaht:</strong> ${(w.total_volume || 0).toFixed(0)} kg${w.avg_hr && w.avg_hr > 0 ? ` | <strong>Keskmine pulss:</strong> ${w.avg_hr} bpm` : ''}</p>
                        <table class="workout-table">
                            <thead>
                                <tr>
                                    <th>Harjutus</th>
                                    <th>Setid</th>
                                    <th>Kordused</th>
                                    <th>Kaal</th>
                                    <th>Maht</th>
                                    <th>Pulss</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${exerciseRows}
                            </tbody>
                        </table>
                    `;
                } else {
                    const icon = {
                        'walking': '🚶',
                        'running': '🏃',
                        'cycling': '🚴',
                        'hiking': '⛰️',
                        'swimming': '🏊'
                    }[w.workout_type] || '🏃';

                    div.innerHTML = `
                        <h3>${icon} ${w.workout_name}</h3>
                        ${w.distance > 0 ? `<p><strong>Distants:</strong> ${w.distance.toFixed(2)} km</p>` : ''}
                        <p><strong>Kestus:</strong> ${w.duration_min} min</p>
                        <p><strong>HR:</strong> ${w.avg_hr} avg, ${w.max_hr} max</p>
                        ${w.kcal > 0 ? `<p><strong>Kalorid:</strong> ${w.kcal} kcal</p>` : ''}
                    `;
                }

                modalBody.appendChild(div);
            });

            // Analüüsi sektsioon
            if (analyses[date]) {
                const analysisDiv = document.createElement('div');
                analysisDiv.className = 'workout-analysis';
                analysisDiv.innerHTML = `
                    <h3>Analüüs</h3>
                    <div class="analysis-text">${analyses[date].replace(/\n/g, '<br>')}</div>
                `;
                modalBody.appendChild(analysisDiv);
            }

            modal.classList.add('active');
        }

        function closeModal(event) {
            if (!event || event.target.id === 'modal') {
                document.getElementById('modal').classList.remove('active');
            }
        }

        function prevMonth() {
            currentMonth--;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            renderCalendar();
        }

        function nextMonth() {
            currentMonth++;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            renderCalendar();
        }

        function updateStats() {
            // Filtreeri ainult valitud kuu treeningud
            const monthPrefix = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}`;
            const monthWorkouts = Object.entries(workouts)
                .filter(([date]) => date.startsWith(monthPrefix))
                .flatMap(([, ws]) => ws);

            const statCounts = {
                gymCount: monthWorkouts.filter(w => w.source === 'gymaholic').length,
                walkCount: monthWorkouts.filter(w => w.workout_type === 'walking').length,
                swimCount: monthWorkouts.filter(w => w.workout_type === 'swimming').length,
                cycleCount: monthWorkouts.filter(w => w.workout_type === 'cycling').length,
                runCount: monthWorkouts.filter(w => w.workout_type === 'running').length,
                hikeCount: monthWorkouts.filter(w => w.workout_type === 'hiking').length,
            };
            Object.entries(statCounts).forEach(([id, count]) => {
                const el = document.getElementById(id);
                el.textContent = count;
                el.closest('.stat-card').style.display = count > 0 ? '' : 'none';
            });

            // Progressi arvutamine (kogu ajalugu)
            const allWorkouts = Object.values(workouts).flat();
            updateProgress(allWorkouts);
        }

        const TYPE_LABELS = {

        const TYPE_ORDER = ['rind', 'selg', 'jalad', 'strength', 'walking', 'running', 'cycling', 'swimming', 'hiking'];

        // Mis näitajad iga kardio tüübi puhul (nimi, ühik, võti w-s, parem = väiksem?)
        const CARDIO_METRICS = {

                {name: 'Kiirus',       unit: 'km/h',    key: 'speed_km_per_h',   lowerBetter: false},
                {name: 'Keskmine HR',  unit: 'bpm',     key: 'avg_hr',           lowerBetter: true},
                {name: 'Distants',     unit: 'km',      key: 'distance',         lowerBetter: false}
            ],
            'swimming': [
                {name: 'Tempo',        unit: 'min/100m',key: 'pace_min_per_100m',lowerBetter: true},
                {name: 'Keskmine HR',  unit: 'bpm',     key: 'avg_hr',           lowerBetter: true},
                {name: 'Distants',     unit: 'm',       key: 'distance_m',       lowerBetter: false}
            ],
            'hiking':   [
                {name: 'Distants',     unit: 'km',      key: 'distance',         lowerBetter: false},
                {name: 'Keskmine HR',  unit: 'bpm',     key: 'avg_hr',           lowerBetter: true},
                {name: 'Kestus',       unit: 'min',     key: 'duration_min',     lowerBetter: false}
            ]
        };

        function renderChart(canvasId, labels, values, color, tooltipFmt) {
            requestAnimationFrame(() => {
                const ctx = document.getElementById(canvasId);
                if (!ctx) return;
                const chart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: values,
                            borderColor: color,
                            backgroundColor: color + '33',
                            borderWidth: 2,
                            cubicInterpolationMode: 'monotone',
                            tension: 0,
                            fill: true,
                            pointRadius: 2,
                            pointHoverRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: { callbacks: { label: tooltipFmt } }
                        },
                        scales: {
                            x: { ticks: { color: '#999', font: { size: 9 }, maxTicksLimit: 4 }, grid: { display: false } },
                            y: { ticks: { color: '#999', font: { size: 9 }, maxTicksLimit: 4 }, grid: { color: 'rgba(255,255,255,0.05)' } }
                        }
                    }
                });
                window._progressCharts.push(chart);
            });
        }

        function trendSummary(values, lowerBetter, unit) {
            if (!values || values.length === 0) return {html: '', trendClass: ''};
            const first = values[0];
            const last = values[values.length - 1];
            const delta = last - first;
            const absDelta = Math.abs(delta);
            let trendClass = 'flat';
            let arrow = '→';
            if (absDelta > (Math.abs(first) * 0.02)) {
                const isImprovement = lowerBetter ? delta < 0 : delta > 0;
                trendClass = isImprovement ? 'up' : 'down';
                arrow = delta > 0 ? '↑' : '↓';
            }
            const lastStr = (Number.isInteger(last) ? last : last.toFixed(1));
            return {
                html: `<div class="trend ${trendClass}">${arrow} ${lastStr} ${unit}</div><div>${values.length} sess.</div>`,
                trendClass
            };
        }

        function addProgressItem(grid, type, key, label, unit, values, labels, tooltipFmt, lowerBetter) {
            if (!values || values.length === 0) return;
            const card = document.createElement('div');
            card.className = 'progress-item';
            card.style.borderLeftColor = TYPE_COLORS[type];

            const canvasId = `chart_${type}_${key}`;
            const nameDiv = document.createElement('div');
            nameDiv.className = 'exercise-name';
            nameDiv.innerHTML = `${label}<span class="metric-unit">${unit}</span>`;
            card.appendChild(nameDiv);

            const wrap = document.createElement('div');
            wrap.className = 'mini-chart-wrapper';
            const canvas = document.createElement('canvas');
            canvas.id = canvasId;
            wrap.appendChild(canvas);
            card.appendChild(wrap);

            const summary = document.createElement('div');
            summary.className = 'progress-summary';
            summary.innerHTML = trendSummary(values, lowerBetter, unit).html;
            card.appendChild(summary);

            grid.appendChild(card);
            renderChart(canvasId, labels, values, TYPE_COLORS[type], tooltipFmt);
        }

        function updateProgress(allWorkouts) {
            const gymWorkouts = allWorkouts.filter(w => w.source === 'gymaholic');

            // Kogu iga harjutuse ajalugu
            const exerciseHistory = {};
            gymWorkouts.forEach(w => {
                const wtype = w.workout_type || 'strength';
                if (!w.exercises) return;
                w.exercises.forEach(ex => {
                    const name = ex.name;
                    const weight = ex.weight_kg || 0;
                    const lname = name.toLowerCase();
                    if (weight <= 0 || lname.includes('rowing') || lname.includes('treadmill')) return;
                    if (!exerciseHistory[name]) {
                        exerciseHistory[name] = { type: wtype, history: [] };
                    }
                    exerciseHistory[name].history.push({
                        date: w.timestamp || w.date,
                        weight: weight,
                        reps: ex.reps || 0,
                        sets: ex.sets || 0
                    });
                });
            });

            // Grupeeri treeningtüübi järgi
            const typeGroups = { 'rind': [], 'selg': [], 'jalad': [], 'strength': [] };
            Object.entries(exerciseHistory).forEach(([name, data]) => {
                const type = typeGroups[data.type] !== undefined ? data.type : 'strength';
                typeGroups[type].push({ name, type, history: data.history });
            });

            const container = document.getElementById('progressGroups');
            container.innerHTML = '';

            // Hävita vanad chart'id
            if (window._progressCharts) {
                window._progressCharts.forEach(c => { try { c.destroy(); } catch(e) {} });
            }
            window._progressCharts = [];

            // Jõutrennide sektsioonid
            ['rind', 'selg', 'jalad', 'strength'].forEach(type => {
                const exercises = typeGroups[type];
                if (!exercises || exercises.length === 0) return;

                exercises.sort((a, b) => a.name.localeCompare(b.name, 'et'));

                const group = document.createElement('div');
                group.className = 'progress-group';
                const title = document.createElement('div');
                title.className = 'progress-group-title';
                title.textContent = TYPE_LABELS[type];
                title.style.borderLeftColor = TYPE_COLORS[type];
                group.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'progress-grid';

                exercises.forEach((ex, i) => {
                    ex.history.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
                    const labels = ex.history.map(h => {
                        const d = new Date(h.date);
                        return isNaN(d) ? '' : d.toLocaleDateString('et-EE', { day: '2-digit', month: '2-digit' });
                    });
                    const weights = ex.history.map(h => h.weight);
                    const tooltipFmt = (c) => {
                        const h = ex.history[c.dataIndex];
                        return `${h.sets}×${h.reps} @ ${h.weight}kg`;
                    };
                    addProgressItem(grid, type, `ex${i}`, ex.name, 'kg', weights, labels, tooltipFmt, false);
                });

                group.appendChild(grid);
                container.appendChild(group);
            });

            // Kardio sektsioonid — iga tüübi kohta 3 näitajat
            const cardioWorkouts = allWorkouts.filter(w => w.source === 'workoutdoor');
            const cardioByType = {};
            cardioWorkouts.forEach(w => {
                const t = w.workout_type;
                if (!CARDIO_METRICS[t]) return;
                (cardioByType[t] = cardioByType[t] || []).push(w);
            });

            Object.keys(CARDIO_METRICS).forEach(type => {
                const sessions = cardioByType[type];
                if (!sessions || sessions.length < 2) return;  // Trendi jaoks vaja ≥2 sessiooni

                sessions.sort((a, b) => (a.timestamp || '').localeCompare(b.timestamp || ''));

                const group = document.createElement('div');
                group.className = 'progress-group';
                const title = document.createElement('div');
                title.className = 'progress-group-title';
                title.textContent = TYPE_LABELS[type];
                title.style.borderLeftColor = TYPE_COLORS[type];
                group.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'progress-grid';

                const labels = sessions.map(s => {
                    const d = new Date(s.timestamp || s.date);
                    return isNaN(d) ? '' : d.toLocaleDateString('et-EE', { day: '2-digit', month: '2-digit' });
                });

                CARDIO_METRICS[type].forEach(metric => {
                    const values = sessions.map(s => {
                        if (metric.key === 'distance_m') return Math.round((s.distance || 0) * 1000);
                        return s[metric.key] || 0;
                    }).filter(v => v > 0);
                    if (values.length < 2) return;
                    // Aga labels peavad vastama filtered values'ile:
                    const fullLabels = sessions.map((s, i) => {
                        const v = metric.key === 'distance_m' ? Math.round((s.distance || 0) * 1000) : (s[metric.key] || 0);
                        return v > 0 ? labels[i] : null;
                    }).filter(l => l !== null);
                    const tooltipFmt = (c) => `${values[c.dataIndex]} ${metric.unit}`;
                    addProgressItem(grid, type, metric.key, metric.name, metric.unit, values, fullLabels, tooltipFmt, metric.lowerBetter);
                });

                if (grid.children.length > 0) {
                    group.appendChild(grid);
                    container.appendChild(group);
                }
            });
        }

        // Initialize
        renderCalendar();
    </script>
</body>
